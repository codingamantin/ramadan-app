name: Deploy to GitHub Pages

on:
  push:
    branches: [develop]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          HIJRI_YEAR: 1447
          API_URL: https://api.aladhan.com/v1
          # Ensure your Env Var is present during build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # TanStack Start / Vinxi usually outputs to .output/public
          path: .output/public

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
